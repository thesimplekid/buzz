name: sprout_mobile
description: Sprout mobile client
publish_to: 'none'
version: 0.3.6+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  hooks_riverpod: ^3.0.3
  flutter_hooks: ^0.21.3
  lucide_icons_flutter: ^3.1.0
  http: ^1.4.0
  flutter_secure_storage: ^10.0.0
  mobile_scanner: ^7.0.0
  shared_preferences: ^2.5.5
  web_socket_channel: ^3.0.1
  connectivity_plus: ^7.0.0
  nostr: ^2.0.0
  pointycastle: ^4.0.0
  url_launcher: ^6.3.2
  gpt_markdown: ^1.1.6
  intl: ^0.20.2
  uuid: ^4.5.1
  image_picker: ^1.1.2
  video_player: ^2.10.1
  package_info_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.0
  riverpod_lint: ^3.1.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  fonts:
    - family: Geist
      fonts:
        - asset: assets/fonts/Geist-Variable.ttf
        - asset: assets/fonts/Geist-Italic-Variable.ttf
          style: italic
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Variable.ttf
        - asset: assets/fonts/GeistMono-Italic-Variable.ttf
          style: italic
